name: Skill Toolkit issue
description: Report a bug, documentation gap, validation problem, or improvement idea.
title: "[Issue]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Skill Toolkit Public Pack. Keep reports public-safe: do not include secrets, private registry data, customer material, or unpublished production assets.
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Documentation or README
        - Install or quick start
        - Skill behavior
        - Validation script
        - Example or visual asset
        - Public/private boundary
        - Other
    validations:
      required: true
  - type: input
    id: affected_path
    attributes:
      label: Affected path or Skill
      placeholder: "skills/skill-modify, docs/QUICK_START.zh-CN.md, README.md"
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happens now?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or example
      description: Include commands, sample paths, screenshots, or a small scenario when possible.
      render: shell
  - type: textarea
    id: validation
    attributes:
      label: Validation already tried
      description: Paste public-safe command output or say "not run".
      placeholder: |
        python3 skills/skill-modify/scripts/quick_validate.py skills/skill-modify
        python3 skills/skill-modify/scripts/audit_skill.py skills/skill-modify
  - type: checkboxes
    id: public_boundary
    attributes:
      label: Public boundary check
      options:
        - label: I did not include secrets, private registry data, customer material, or unpublished production assets.
          required: true
